<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxirgi qadam qoldi!</title>
<style>
@font-face{font-family:"Bebas Neue";src:url(/fonts/BebasNeue-Regular.woff2) format('woff2');font-weight:400;font-style:normal;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.header{background-color:#ebe8e3;min-height:100vh;padding-top:180px}
.header-container{margin:0 auto;max-width:671px;width:100%;display:flex;padding:0 20px}
.hero-left{max-width:903px;width:100%;display:flex;flex-direction:column;align-items:center}
.hero-title{font-family:"Bebas Neue",sans-serif;font-weight:400;font-size:96px;line-height:100%;text-align:center;margin-bottom:25px;text-transform:uppercase;max-width:622px}
.hero-text{font-weight:500;font-size:clamp(17px,5vw,29px);line-height:150%;margin-bottom:58px;max-width:522px;text-align:center}
.hero-text>a{color:#ff0000;text-decoration:none}
.hero-btn-box{max-width:585px;width:100%}
.hero-img{display:flex;align-items:center;justify-content:center;margin:0 auto 46px}
.hero-img svg{display:block;height:119px;width:auto}
.hero-btn{display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",sans-serif;font-weight:400;font-size:64px;line-height:100%;text-align:center;padding:39px 0 38px;background-color:#039BE5;box-shadow:0 5px 0 0 #006393;color:#fff;border-radius:30px;max-width:585px;width:100%;border:none;text-transform:uppercase;margin-bottom:42px;text-decoration:none;max-height:142px}
.error-msg{display:none;color:#c00;font-size:14px;text-align:center;margin-top:10px}
@media (max-width:500px){
.header{padding-top:30%}
.hero-left{display:block}
.header-container{margin:0 auto;text-align:center;padding:0 10px}
.hero-title{font-size:40px;margin-bottom:5px}
.hero-img{margin-bottom:24px;height:69px}
.hero-img svg{height:69px}
.hero-btn{font-size:32px;padding:23px 0 20px;border-radius:30px;max-width:345px;margin:0 auto 25px}
}
</style>
</head>
<body>
  <section class="header">
    <div class="header-container">
      <div class="hero-left">
        <h1 class="hero-title">oxirgi qadam qoldi!</h1>
        <p class="hero-text">
          Bepul darsni qo'lga kiritish uchun <br> quyidagi tugma orqali telegram kanalga <a href="#">obuna bo'ling</a>
        </p>
        <div class="hero-btn-box">
          <span class="hero-img" aria-hidden="true">
            <svg width="16" height="119" viewBox="0 0 16 119" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.2929 118.707C7.68342 119.098 8.31659 119.098 8.70711 118.707L15.0711 112.343C15.4616 111.953 15.4616 111.319 15.0711 110.929C14.6805 110.538 14.0474 110.538 13.6569 110.929L8.00001 116.586L2.34315 110.929C1.95263 110.538 1.31946 110.538 0.928937 110.929C0.538413 111.319 0.538413 111.953 0.928937 112.343L7.2929 118.707ZM8 0L7 4.37114e-08L7.00001 118L8.00001 118L9.00001 118L9 -4.37114e-08L8 0Z" fill="black"/>
            </svg>
          </span>
          <a href="#" class="hero-btn thankYouBtn">obuna bo'lish</a>
          <p class="error-msg" id="errorMessage">Yuborishda xatolik. Iltimos, birozdan so'ng qayta urinib ko'ring.</p>
        </div>
      </div>
    </div>
  </section>
  <script src="/js/thankYou.js" defer></script>
</body>
</html>
