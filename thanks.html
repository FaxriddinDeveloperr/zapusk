<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rahmat! — Ro'yxatdan o'tdingiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { background:#0f1220; font-family:'Roboto',sans-serif; }
  .phone {
    width:100%; max-width:390px; min-height:100vh; margin:0 auto;
    background:linear-gradient(180deg,#132a63 0%,#0e1b3d 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px 26px; position:relative; overflow:hidden;
  }
  .glow { position:absolute; width:340px; height:340px; border-radius:50%;
    background:radial-gradient(circle,rgba(46,116,232,.35),transparent 65%);
    top:-40px; left:50%; transform:translateX(-50%); }
  .check-badge {
    width:104px; height:104px; border-radius:50%;
    background:linear-gradient(180deg,#38C172,#2FA45E);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 16px 40px rgba(47,164,94,.45);
    position:relative; z-index:2;
    animation:pop .45s cubic-bezier(.16,1,.3,1) both;
  }
  .check-badge svg { width:56px; height:56px; }
  .check-badge svg polyline {
    stroke-dasharray:60; stroke-dashoffset:60;
    animation:draw .5s .25s ease-out forwards;
  }
  h1 {
    font-family:'Bebas Neue','Anton',sans-serif; color:#fff;
    font-size:40px; letter-spacing:1px; margin-top:26px; line-height:1;
    position:relative; z-index:2;
    animation:rise .5s .1s cubic-bezier(.16,1,.3,1) both;
  }
  .sub { color:#c7d3ee; font-size:15px; line-height:1.5; margin-top:14px; max-width:300px;
    position:relative; z-index:2; animation:rise .5s .18s cubic-bezier(.16,1,.3,1) both; }
  .sub b { color:#fff; }
  .info {
    margin-top:26px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
    border-radius:16px; padding:16px 20px; color:#dfe7f7; font-size:14px; line-height:1.6;
    position:relative; z-index:2; width:100%; max-width:320px;
    animation:rise .5s .26s cubic-bezier(.16,1,.3,1) both;
  }
  .info .row { display:flex; justify-content:space-between; gap:12px; }
  .info .row + .row { margin-top:6px; }
  .info .k { color:#93a4cc; } .info .v { color:#fff; font-weight:600; }
  .home {
    margin-top:30px; text-decoration:none; color:#fff;
    font-family:'Bebas Neue','Anton',sans-serif; font-size:22px; letter-spacing:1px;
    background:linear-gradient(180deg,#2E74E8,#1B54C7); padding:16px 40px; border-radius:40px;
    box-shadow:0 12px 28px rgba(30,80,200,.45); position:relative; z-index:2;
    animation:rise .5s .32s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes pop { from{opacity:0; transform:scale(.6);} to{opacity:1; transform:scale(1);} }
  @keyframes draw { to{ stroke-dashoffset:0; } }
  @keyframes rise { from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion:reduce){
    .check-badge,.check-badge svg polyline,h1,.sub,.info,.home{animation:none;}
    .check-badge svg polyline{stroke-dashoffset:0;}
  }
</style>
</head>
<body>
  <main class="phone">
    <div class="glow"></div>
    <div class="check-badge">
      <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="12 25 21 34 37 15"/>
      </svg>
    </div>
    <h1>RAHMAT!</h1>
    <p class="sub">Siz muvaffaqiyatli <b>ro'yxatdan o'tdingiz</b>. Webinar havolasi va eslatma tez orada telefoningizga yuboriladi.</p>

    <div class="info" id="info" style="display:none">
      <div class="row"><span class="k">Ism</span><span class="v" id="vName">—</span></div>
      <div class="row"><span class="k">Telefon</span><span class="v" id="vPhone">—</span></div>
    </div>

    <a class="home" href="/">BOSH SAHIFA</a>
  </main>

  <script>
    try {
      var lead = JSON.parse(localStorage.getItem("lead") || "null");
      if (lead) {
        document.getElementById("vName").textContent  = lead.name  || "—";
        document.getElementById("vPhone").textContent = lead.phone || "—";
        document.getElementById("info").style.display = "block";
      }
    } catch (e) {}
  </script>
</body>
</html>
